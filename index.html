<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <title>인재원 Eywa</title>
    <meta name="description" content="침산동 수학/영어/과학 학원" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="인재원 Eywa" />
    <meta property="og:description" content="인재원 학원 관리 시스템" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="인재원" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="인재원 Eywa" />
    <meta name="twitter:description" content="인재원 학원 관리 시스템" />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />
  <!-- importmap removed - using bundled dependencies instead -->
<link rel="stylesheet" href="/index.css">
    <!-- 캐시 방지: 구버전 감지 시 강제 새로고침 -->
    <script>
    (function(){
      var KEY='__app_v';
      var BUILD='%%BUILD_HASH%%';
      if(BUILD.indexOf('%%')===0)return; // dev 모드 스킵

      function forceReload(){
        localStorage.setItem(KEY,BUILD);
        // 캐시를 완전히 무시하고 새로고침
        if('caches' in window){
          caches.keys().then(function(names){
            names.forEach(function(n){ caches.delete(n); });
          }).then(function(){ location.reload(); });
        } else {
          location.reload();
        }
      }

      function checkRemoteVersion(){
        fetch('/version.json?t='+Date.now(),{cache:'no-store'})
          .then(function(r){return r.json()})
          .then(function(d){
            if(d.version && d.version!==BUILD){
              localStorage.setItem(KEY,d.version);
              location.reload();
            }
          }).catch(function(){});
      }

      // 초기 로드: 구버전이면 즉시 새로고침
      var prev=localStorage.getItem(KEY);
      if(prev && prev!==BUILD){
        forceReload();
        return;
      }
      localStorage.setItem(KEY,BUILD);

      // 탭 복귀 시 버전 체크
      document.addEventListener('visibilitychange',function(){
        if(document.visibilityState==='visible') checkRemoteVersion();
      });

      // bfcache 복원 시 버전 체크
      window.addEventListener('pageshow',function(e){
        if(e.persisted) checkRemoteVersion();
      });

      // 5분마다 주기적 버전 체크
      setInterval(checkRemoteVersion, 5*60*1000);
    })();
    </script>
</head>
  <body>
    <div id="root">
      <!-- Pre-React loading screen (replaced when React mounts) -->
      <div id="pre-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#ffffff;">
        <video autoplay muted loop playsinline style="width:100%;height:100vh;object-fit:contain;">
          <source src="/LoadingPage2.mp4" type="video/mp4" />
        </video>
      </div>
    </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
